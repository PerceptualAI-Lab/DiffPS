DATASET:
  TYPE: CUHK_SYSU
  # Edit to your CUHK-SYSU root (or override via train.py --opts DATASET.PATH ...)
  PATH: ../dataset/CUHK-SYSU
  BATCH_SIZE: 5
SOLVER:
  MAX_EPOCHS: 30
  OPTIMIZER: 'Adam'
  BASE_LR: 0.0001
  WEIGHT_DECAY: 0.0
  BIAS_LR_FACTOR: 1.0
  BIAS_DECAY: 0.0
  SGD_MOMENTUM: 0.0
  LR_DECAY_MILESTONES: [8, 14]
  LR_DECAY_GAMMA: 0.1
MODEL:
  BACKBONE_HEAD: 'ResNet'
  REID:
    LOSS:
      LUT_SIZE: 5532
      CQ_SIZE: 5000
      MARGIN: 0.25
  PARAM_INIT: 'v1'
FEATURE_EXTRACTOR:
  AGGNET_OUTPUT_CHANNELS: 1024